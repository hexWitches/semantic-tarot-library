name: turtle

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install rapper
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends raptor2-utils
      - name: Validate ontology TTL
        run: rapper -i turtle -c ontology/smtOntology.ttl
      - name: Validate knowledge graph TTL
        run: rapper -i turtle -c ontology/smtGraph.ttl
